<!DOCTYPE html>

    <!-- Open Graph defaults -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Spa & Prestige Collection" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:title" content="Spa & Prestige Collection — Réseau de Spas Premium" />

      property="og:description"
      content="Découvrez Spa & Prestige Collection, le réseau premium des plus beaux spas, thermes et instituts de bien-être en France et en Europe."

    <!-- Twitter defaults -->

    <!-- Préconnect critiques -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://admin.spa-prestige-collection.com">
    <link rel="dns-prefetch" href="https://srm3t.mjt.lu">

    <!-- Fonts avec chargement non-bloquant -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"></noscript>

    <!-- CSS critique inline -->
    <style>
      body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,'Open Sans','Helvetica Neue',sans-serif;background:#fff}
      #root{min-height:100vh}
      .app-boot{display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:system-ui,-apple-system,sans-serif;color:#b8955a}
      .hero-placeholder{min-height:400px;background:#f5f5f5}
      .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    </style>

    <!-- GTM chargé après "load" pour ne pas bloquer le rendu -->
    <script>
      window.gtag = window.gtag || function(){(window.dataLayer = window.dataLayer || []).push(arguments);};
      window.addEventListener('load', function() {
        (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src='https://www.googletagmanager.com/gtag/js?id=G-3GYQ0VKY8L';f.parentNode.insertBefore(j,f);})(window,document,'script','dataLayer');
        gtag('js', new Date());
        gtag('config', 'G-3GYQ0VKY8L');
      });
    </script>
  </head>
  <body>
    <!-- Contenu SEO de secours pour les bots si le JS échoue / avant hydratation -->
    <div id="root">
      <noscript>
        <div style="padding:24px;max-width:760px;margin:40px auto;font-family:system-ui,-apple-system,sans-serif">
          <h1>Spa &amp; Prestige Collection</h1>
          <p>Réseau premium des plus beaux spas, thermes et instituts de bien-être en France et en Europe. Veuillez activer JavaScript pour profiter de l'expérience complète.</p>
          <p><a href="/liste-des-spas">Découvrir nos établissements</a></p>
        </div>
      </noscript>
      <div class="app-boot" aria-hidden="true">Spa &amp; Prestige Collection</div>
    </div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // gtranslate chargé après première interaction
      let gtranslateLoaded = false;
      document.addEventListener('click', function() {
        if (!gtranslateLoaded) {
          gtranslateLoaded = true;
          window.gtranslateSettings = {
            default_language: "fr",
            detect_browser_language: true,
            languages: ["fr", "it", "es", "de", "en"],
            wrapper_selector: ".gtranslate_wrapper",
          };
          const script = document.createElement('script');
          script.src = 'https://cdn.gtranslate.net/widgets/latest/flags.js';
          script.defer = true;
          document.body.appendChild(script);
        }
      }, { once: true });
    </script>
  </body>
</html>
